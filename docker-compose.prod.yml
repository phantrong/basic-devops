# Production-like stack: frontend + backend + db cùng chạy.
# Chạy:  docker compose -f docker-compose.prod.yml up -d --build
# Override biến: tạo file .env.prod rồi thêm --env-file .env.prod
name: basic-app-prod

services:
  db:
    image: mysql:8.0
    container_name: app-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-appdb}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # Không mở cổng ra host trong prod — chỉ truy cập nội bộ qua tên "db".
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-password}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: app-backend-prod
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-appdb}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* được "nướng" lúc build → đặt URL backend mà TRÌNH DUYỆT
        # truy cập được (khi deploy thật: https://api.your-domain.com).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: app-frontend-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
